<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="760" viewBox="0 0 1450 760">
<style>
text{font-family:"Noto Sans CJK JP","Yu Gothic",sans-serif;fill:#172033}
.title{font-size:31px;font-weight:700}.label{font-size:23px}.small{font-size:19px}
.shaft{fill:#e8edf4;stroke:#334155;stroke-width:4}.hub{fill:#dbeafe;stroke:#2563eb;stroke-width:4}
.key{fill:#fef3c7;stroke:#b45309;stroke-width:4}.arrow{stroke:#dc2626;stroke-width:4;fill:none}
.box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:3}
</style>
<rect width="1450" height="760" fill="white"/>
<text x="55" y="55" class="title">動力・回転数から軸径と平行キーを選ぶ流れ</text>

<g transform="translate(45,105)">
<circle cx="250" cy="275" r="160" class="hub"/>
<circle cx="250" cy="275" r="95" class="shaft"/>
<rect x="225" y="115" width="50" height="115" class="key"/>
<text x="280" y="170" class="label">キー b×h</text>
<line x1="250" y1="275" x2="345" y2="275" class="arrow"/>
<polygon points="345,275 323,264 323,286" fill="#dc2626"/>
<text x="288" y="255" class="small" fill="#dc2626">d/2</text>
<path d="M115 430 A190 190 0 0 0 385 430" class="arrow"/>
<polygon points="385,430 363,416 366,440" fill="#dc2626"/>
<text x="210" y="490" class="label" fill="#dc2626">トルク T</text>

<rect x="50" y="555" width="410" height="105" rx="16" class="box"/>
<text x="75" y="595" class="label">接線力 Fₜ = 2T/d</text>
<text x="75" y="630" class="small">キーの有効長さ：lₑ</text>
</g>

<g transform="translate(560,100)">
<rect x="0" y="0" width="830" height="600" rx="22" class="box"/>
<text x="35" y="50" class="title">選定手順</text>
<text x="35" y="105" class="label">① 動力と回転数からトルク</text>
<text x="70" y="145" class="small">T = P/ω = 60P/(2πn)</text>
<text x="70" y="177" class="small">T[N·m] = 9550 P[kW] / n[min⁻¹]</text>

<text x="35" y="235" class="label">② 許容せん断応力から軸径</text>
<text x="70" y="275" class="small">τ = 16T/(πd³) ≤ [τ]</text>
<text x="70" y="307" class="small">d ≥ {16T/(π[τ])}¹ᐟ³</text>

<text x="35" y="365" class="label">③ 軸径から標準キー b×h を選ぶ</text>
<text x="70" y="405" class="small">規格表の軸径範囲に従い、標準寸法を採用</text>

<text x="35" y="463" class="label">④ キー長さをせん断・面圧で確認</text>
<text x="70" y="505" class="small">τₖ = 2T/(d b lₑ) ≤ [τₖ]</text>
<text x="70" y="537" class="small">σc = 4T/(d h lₑ) ≤ [σc]</text>

<text x="35" y="585" class="small">⑤ キー溝の応力集中、疲労、ハブ長さ、標準長さも確認</text>
</g>
</svg>