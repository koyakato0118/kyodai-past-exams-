<svg xmlns="http://www.w3.org/2000/svg" width="1350" height="760" viewBox="0 0 1350 760">
<style>
text{font-family:"Noto Sans CJK JP","Yu Gothic",sans-serif;fill:#172033}
.title{font-size:31px;font-weight:700}.label{font-size:23px}.small{font-size:19px}
.bearing{fill:#e8edf4;stroke:#334155;stroke-width:5}.journal{fill:#f8fafc;stroke:#2563eb;stroke-width:5}
.oil{fill:#bae6fd;fill-opacity:.75}.arrow{stroke:#dc2626;stroke-width:5;fill:none}
.pressure{fill:#bbf7d0;stroke:#059669;stroke-width:3}
</style>
<rect width="1350" height="760" fill="white"/>
<text x="55" y="55" class="title">真円形すべり軸受の動圧発生</text>

<circle cx="390" cy="380" r="255" class="bearing"/>
<circle cx="390" cy="380" r="205" fill="white"/>
<circle cx="425" cy="425" r="175" class="journal"/>
<path d="M390 175 A205 205 0 1 1 245 525 A175 175 0 1 0 390 175" class="oil"/>

<path d="M425 220 A205 205 0 0 1 585 390" class="arrow"/>
<polygon points="585,390 563,377 565,400" fill="#dc2626"/>
<text x="520" y="235" class="label" fill="#dc2626">回転 U</text>

<path d="M185 300 C140 260 125 215 125 170" class="arrow"/>
<polygon points="125,170 114,192 136,192" fill="#dc2626"/>
<text x="35" y="320" class="label" fill="#dc2626">負荷 W</text>

<path d="M570 525 C660 470 690 365 650 260" fill="none" stroke="#059669" stroke-width="6"/>
<polygon points="650,260 638,283 661,280" fill="#059669"/>
<text x="655" y="390" class="label" fill="#059669">油膜圧力の合力</text>
<text x="655" y="425" class="small">負荷とつり合う</text>

<path d="M270 208 C330 165 430 155 515 195" fill="none" stroke="#0ea5e9" stroke-width="5"/>
<polygon points="515,195 492,182 494,205" fill="#0ea5e9"/>
<text x="275" y="145" class="label" fill="#0369a1">粘性で油をくさび部へ引き込む</text>

<line x1="390" y1="380" x2="425" y2="425" stroke="#7c3aed" stroke-width="4" stroke-dasharray="7 6"/>
<circle cx="390" cy="380" r="7" fill="#334155"/><circle cx="425" cy="425" r="7" fill="#2563eb"/>
<text x="300" y="365" class="small">軸受中心</text>
<text x="440" y="455" class="small">軸中心（偏心）</text>
<text x="305" y="625" class="label">最小油膜厚さ hₘᵢₙ</text>

<rect x="805" y="120" width="485" height="510" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
<text x="845" y="175" class="title">支持の流れ</text>
<text x="845" y="230" class="label">1. 荷重で軸心が偏心する</text>
<text x="845" y="280" class="label">2. すきまが収束するくさびを形成</text>
<text x="845" y="330" class="label">3. 軸表面が油を粘性で引き込む</text>
<text x="845" y="380" class="label">4. Reynolds方程式に従う圧力が発生</text>
<text x="845" y="430" class="label">5. 圧力の面積積分が外力とつり合う</text>
<text x="845" y="500" class="small">d/dx(h³ dp/dx) = 6μU dh/dx</text>
<text x="845" y="550" class="small">十分な回転数では軸と軸受面が油膜で分離</text>
<text x="845" y="590" class="small">始動・停止時は境界／混合潤滑となり得る</text>
</svg>