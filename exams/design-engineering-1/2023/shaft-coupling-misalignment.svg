<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <style>
    text { font-family:"Noto Sans CJK JP","Yu Gothic",sans-serif; fill:#172033; }
    .title { font-size:30px; font-weight:700; }
    .label { font-size:23px; }
    .shaft { stroke:#334155; stroke-width:20; stroke-linecap:round; }
    .axis { stroke:#94a3b8; stroke-width:2.5; stroke-dasharray:9 8; }
    .coupling { fill:#dbeafe; stroke:#2563eb; stroke-width:4; }
    .arrow { stroke:#dc2626; stroke-width:4; fill:none; }
  </style>
  <rect width="1200" height="680" fill="white"/>
  <text x="55" y="50" class="title">軸継手が許容する代表的な軸ずれ</text>

  <!-- parallel offset -->
  <text x="90" y="112" class="title">偏心（平行偏心）</text>
  <line x1="80" y1="215" x2="340" y2="215" class="axis"/>
  <line x1="420" y1="165" x2="680" y2="165" class="axis"/>
  <line x1="90" y1="215" x2="310" y2="215" class="shaft"/>
  <line x1="450" y1="165" x2="670" y2="165" class="shaft"/>
  <rect x="310" y="140" width="140" height="100" rx="18" class="coupling"/>
  <line x1="365" y1="175" x2="365" y2="215" class="arrow"/>
  <polygon points="365,215 355,195 375,195" fill="#dc2626"/>
  <text x="380" y="205" class="label">e</text>
  <text x="720" y="192" class="label">2軸は平行だが、中心線が横にずれる</text>

  <!-- angular -->
  <text x="90" y="335" class="title">偏角</text>
  <line x1="80" y1="430" x2="350" y2="430" class="axis"/>
  <line x1="440" y1="430" x2="700" y2="350" class="axis"/>
  <line x1="90" y1="430" x2="315" y2="430" class="shaft"/>
  <line x1="455" y1="425" x2="675" y2="357" class="shaft"/>
  <rect x="315" y="380" width="150" height="100" rx="18" class="coupling"/>
  <path d="M520 430 A85 85 0 0 0 500 388" class="arrow"/>
  <text x="525" y="400" class="label">θ</text>
  <text x="720" y="410" class="label">2軸の中心線が角度を持つ</text>

  <!-- end play -->
  <text x="90" y="545" class="title">エンドプレイ（軸方向変位）</text>
  <line x1="90" y1="610" x2="315" y2="610" class="shaft"/>
  <line x1="470" y1="610" x2="695" y2="610" class="shaft"/>
  <rect x="315" y="565" width="155" height="90" rx="18" class="coupling"/>
  <line x1="355" y1="535" x2="430" y2="535" class="arrow"/>
  <polygon points="355,535 375,525 375,545" fill="#dc2626"/>
  <polygon points="430,535 410,525 410,545" fill="#dc2626"/>
  <text x="377" y="520" class="label">Δx</text>
  <text x="720" y="618" class="label">温度変化などによる軸方向の相対移動</text>
</svg>