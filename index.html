<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>京大工学部 過去問解説</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"]],
          displayMath: [["\\[", "\\]"]],
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre"],
        },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <header class="app-header">
      <button class="icon-button menu-button" id="menuButton" type="button" aria-label="ナビゲーションを開く" aria-controls="sidebar" aria-expanded="false">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
      <a class="brand" href="/" data-route="/">
        <span class="brand-mark" aria-hidden="true">K</span>
        <span>
          <strong>京大工学部 過去問解説</strong>
          <small>過去問解説</small>
        </span>
      </a>
      <div class="header-status" id="headerStatus"></div>
    </header>

    <div class="mobile-backdrop" id="mobileBackdrop" hidden></div>

    <main class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="科目と問題のナビゲーション">
        <div class="sidebar-inner">
          <label class="search-box">
            <span>検索</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="問題・キーワード" />
          </label>
          <nav id="sidebarNav" class="sidebar-nav"></nav>
        </div>
      </aside>

      <section class="content-pane" id="contentPane" tabindex="-1"></section>

      <aside class="right-rail" id="rightRail" aria-label="補足情報"></aside>
    </main>

    <button class="to-top clickable" id="toTopButton" type="button" aria-label="ページ上部へ戻る">↑</button>

    <script src="./data/content.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
